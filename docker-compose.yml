version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tortas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  backend:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "pip install flask psycopg2-binary && python app.py"
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:latest
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data: