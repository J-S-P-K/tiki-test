version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: heroes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  backend:
    image: python:3.11
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "pip install flask psycopg2-binary && python app.py"
    depends_on:
      - db

  nginx:
    image: nginx:latest
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend