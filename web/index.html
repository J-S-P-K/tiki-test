<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!--  Título de la página -->
<title>Tienda de Tortas</title>

<!--  Conecto mi archivo CSS para los estilos -->
<link rel="stylesheet" href="estilos.css">
</head>

<body>

<!--  Contenedor principal de toda la página -->
<div class="contenedor">

  <!-- Encabezado con el nombre del emprendimiento -->
  <div class="header">
    <h1>Dulces Delicias</h1>

    <!--  Icono de menú (solo visual por ahora) -->
    <div class="menu-icon">☰</div>
  </div>

  <!--  Sección donde muestro todos los productos -->
  <div class="productos">

    <!--  Producto 1 -->
    <div class="producto">
      <h2>Torta de Chocolate</h2>

      <!--  Precio del producto -->
      <p class="precio">1500</p>

      <!--  Botón para seleccionar el producto -->
      <button class="pedir">Pedir</button>
    </div>

    <!--  Producto 2 -->
    <div class="producto">
      <h2>Mousse de Frutilla</h2>
      <p class="precio">800</p>
      <button class="pedir">Pedir</button>
    </div>

    <!--  Producto 3 -->
    <div class="producto">
      <h2>Donita Normal</h2>
      <p class="precio">200</p>
      <button class="pedir">Pedir</button>
    </div>

  </div>

  <!--  Sección de pedido (no se usa mucho, queda oculta) -->
  <div class="pedido oculto">

    <!--  Acá podría mostrarse el nombre del producto -->
    <h3 class="nombreTitulo"></h3>

    <!--  Acá el precio final -->
    <p class="precioFinal"></p>

    <!--  Input para ingresar un monto (opcional) -->
    <input type="number" class="monto" placeholder="Monto">

    <!--  Botón para enviar -->
    <button class="enviar">Enviar</button>
  </div>

</div>

<!--  Formulario que aparece cuando el usuario elige un producto -->
<div class="formulario oculto">

  <h2>Confirmar Pedido</h2>

  <!--  Input para que el usuario escriba su nombre -->
  <input type="text" class="input nombre" placeholder="Tu nombre completo">

  <!--  Input que se completa automáticamente con el producto -->
  <input type="text" class="input productoInput" placeholder="Producto" readonly>

  <!--  Área para que el usuario agregue detalles -->
  <textarea class="input detalles" placeholder="Detalles"></textarea>

  <!--  Input del precio (se completa solo) -->
  <input type="text" class="input precioInput" placeholder="Precio" readonly>

  <!-- Botón para enviar el pedido -->
  <button class="enviar">Enviar Pedido</button>

</div>

<!--  Conecto mi archivo JavaScript -->
<script src="script.js"></script>

</body>
</html>
